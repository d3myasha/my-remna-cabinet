services:
  cabinet-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-Cabinet Frontend}
        VITE_APP_LOGO: ${VITE_APP_LOGO:-C}
    container_name: cabinet_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${CABINET_PORT:-3020}:80'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
